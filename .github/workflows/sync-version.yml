name: Sync Version

on:
  push:
    tags:
      - 'v*'

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update pyproject.toml
        run: sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.VERSION }}"/' pyproject.toml

      - name: Update __init__.py
        run: sed -i 's/__version__ = ".*"/__version__ = "${{ steps.version.outputs.VERSION }}"/' src/lynx/__init__.py

      - name: Update README badge
        run: sed -i "s/version-[0-9]*\.[0-9]*\.[0-9]*-blue/version-${{ steps.version.outputs.VERSION }}-blue/" README.md

      - name: Create commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pyproject.toml src/lynx/__init__.py README.md
          git diff --staged --quiet || git commit -m "chore: sync version to ${{ steps.version.outputs.VERSION }}"
          git push